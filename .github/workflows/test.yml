name: Build source code and test it

on:
  push:
    branches:
      - renovate/**
  pull_request:
    branches: [ main ]
  workflow_call:  # Allow this workflow to be called by other workflows

permissions:
  contents: read

env:
  MAESTRO_VERSION: 2.4.0
  MAESTRO_ZIP_SHA256: aea22ce67ab6718997ec990c58652ede0c2be8f10ac4799039ca3dce3390d634
  MAESTRO_CLI_NO_ANALYTICS: 1

jobs:
  guard_swiftpm_version:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Enforce capacitor-swift-pm version
        run: |
          set -euo pipefail
          if ! grep -Eq 'https://github.com/ionic-team/capacitor-swift-pm\.git"[[:space:]]*,[[:space:]]*from:[[:space:]]*"8\.0\.0"' Package.swift; then
            echo "Expected capacitor-swift-pm to be pinned to 8.0.0 in Package.swift"
            exit 1
          fi
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Build
        id: build_code
        run: bun run verify:android
  example_app_android_maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install plugin dependencies
        run: bun i
      - name: Build plugin
        run: bun run build
      - name: Install example app dependencies
        working-directory: example-app
        run: bun i
      - name: Build example app
        working-directory: example-app
        run: bun run build
      - name: Sync Android shell
        working-directory: example-app
        run: bunx cap sync android
      - name: Build debug APK
        working-directory: example-app/android
        run: ./gradlew assembleDebug
      - name: Install Maestro CLI
        run: |
          curl -LsSf -o /tmp/maestro.zip "https://github.com/mobile-dev-inc/Maestro/releases/download/cli-${MAESTRO_VERSION}/maestro.zip"
          echo "${MAESTRO_ZIP_SHA256}  /tmp/maestro.zip" | shasum -a 256 -c -
          rm -rf "$HOME/.maestro"
          mkdir -p "$HOME/.maestro"
          unzip -q /tmp/maestro.zip -d "$HOME/.maestro"
          chmod +x "$HOME/.maestro/maestro/bin/maestro"
          echo "$HOME/.maestro/maestro/bin" >> "$GITHUB_PATH"
      - name: Run Maestro smoke tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: x86_64
          script: |
            adb install -r example-app/android/app/build/outputs/apk/debug/app-debug.apk
            "$HOME/.maestro/maestro/bin/maestro" test example-app/maestro/ci-smoke-test-plan.yaml
  example_app_ios_maestro:
    runs-on: macOS-latest
    timeout-minutes: 45
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install plugin dependencies
        run: bun i
      - name: Build plugin
        run: bun run build
      - name: Install example app dependencies
        working-directory: example-app
        run: bun i
      - name: Build example app
        working-directory: example-app
        run: bun run build
      - name: Sync iOS shell
        working-directory: example-app
        run: bunx cap sync ios
      - name: Build and install app on iOS simulator
        working-directory: example-app/ios/App
        run: |
          SIMULATOR_NAME="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && !/unavailable/ { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); print $1; exit }')"
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          xcrun simctl boot "$SIMULATOR_NAME"
          xcrun simctl bootstatus "$SIMULATOR_NAME" -b
          xcodebuild \
            -scheme App \
            -configuration Debug \
            -derivedDataPath build \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            CODE_SIGNING_ALLOWED=NO
          xcrun simctl install booted build/Build/Products/Debug-iphonesimulator/App.app
      - name: Install Maestro CLI
        run: |
          curl -LsSf -o /tmp/maestro.zip "https://github.com/mobile-dev-inc/Maestro/releases/download/cli-${MAESTRO_VERSION}/maestro.zip"
          echo "${MAESTRO_ZIP_SHA256}  /tmp/maestro.zip" | shasum -a 256 -c -
          rm -rf "$HOME/.maestro"
          mkdir -p "$HOME/.maestro"
          unzip -q /tmp/maestro.zip -d "$HOME/.maestro"
          chmod +x "$HOME/.maestro/maestro/bin/maestro"
          echo "$HOME/.maestro/maestro/bin" >> "$GITHUB_PATH"
      - name: Run Maestro smoke tests on iOS simulator
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
        run: |
          "$HOME/.maestro/maestro/bin/maestro" test example-app/maestro/ci-smoke-test-plan.yaml
  build_ios:
    runs-on: macOS-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Build
        id: build_code
        run: bun run verify:ios
  web:
    runs-on: ubuntu-latest
    name: 'Build code and test'
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Lint
        id: lint_code
        run: bun run lint
      - name: Build
        id: build_code
        run: bun run build
      - name: Verify
        id: verify_code
        run: bun run verify:web
